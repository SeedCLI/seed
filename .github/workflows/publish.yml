name: Publish

on:
  push:
    tags:
      - "v[0-9]*"
      - "*@[0-9]*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish packages
        run: node --import tsx scripts/publish.ts --provenance --tag "${{ github.ref_name }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  release-binaries:
    needs: [ci]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node24-linux-x64
          - os: ubuntu-24.04-arm
            target: node24-linux-arm64
          - os: macos-latest
            target: node24-macos-arm64
          - os: windows-latest
            target: node24-win-x64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run build
      - name: Build standalone executable
        run: npx @hakobu/hakobu ./packages/cli --bundle --entry dist/index.js --target ${{ matrix.target }} --output ./dist/seed
      - uses: actions/upload-artifact@v4
        with:
          name: seed-${{ matrix.target }}
          path: ./dist/seed*
